# Controller and trajectory parameters for TurtleBot3 trajectory tracking
trajectory_node:
  ros__parameters:
    # ---- Waypoints ----
    # Default waypoints forming a figure-eight-ish loop
    waypoints_x: [0.0, 1.0, 2.0, 3.0, 4.0, 4.0, 3.0, 2.0, 1.0, 0.0]
    waypoints_y: [0.0, 0.0, 0.5, 0.5, 0.0, -1.0, -1.5, -1.5, -1.0, 0.0]

    # ---- Path Smoother ----
    smoothing_method: "cubic_spline"     # "cubic_spline" or "gradient_descent"
    num_smooth_points: 200               # Number of interpolated points
    smooth_weight_data: 0.1              # Gradient descent: data fidelity weight
    smooth_weight_smooth: 0.3            # Gradient descent: smoothness weight

    # ---- Trajectory Generator ----
    max_velocity: 0.18           # m/s  (TurtleBot3 Burger max ~0.22 m/s)
    max_acceleration: 0.5        # m/s²
    velocity_profile: "trapezoidal"   # "trapezoidal" or "constant"
    trajectory_dt: 0.05          # seconds between trajectory samples

    # ---- Trajectory Controller ----
    look_ahead_distance: 0.3     # m  (Pure Pursuit look-ahead)
    max_angular_velocity: 2.0    # rad/s
    goal_tolerance: 0.08         # m  (consider goal reached when within this)
    pid_kp: 1.0                  # Cross-track PID proportional gain
    pid_ki: 0.0                  # Cross-track PID integral gain
    pid_kd: 0.1                  # Cross-track PID derivative gain
