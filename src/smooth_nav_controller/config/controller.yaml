# smooth_nav_controller default parameters
trajectory_tracker_node:
  ros__parameters:
    # Pure Pursuit
    look_ahead_distance: 0.3      # meters — base look-ahead distance
    adaptive_look_ahead_gain: 0.5 # L_d = L_d_base + gain * |v|  (0 = fixed)
    max_linear_velocity: 0.18     # TurtleBot3 Burger max: 0.22 m/s
    max_angular_velocity: 2.0     # rad/s

    # Goal zone
    goal_tolerance: 0.08          # meters — distance to goal to consider "arrived"
    goal_deceleration_radius: 0.3 # meters — linearly decelerate inside this radius

    # PID gains for cross-track error correction
    pid_kp: 1.0
    pid_ki: 0.0
    pid_kd: 0.1

    # Control loop rate (Hz)
    control_rate: 20.0
