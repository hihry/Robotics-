# =============================================================================
# Docker Compose: Robotics Assignment Environment
# =============================================================================
# Usage:
#   docker compose up -d        (start container)
#   docker compose exec ros2 bash  (open shell)
#   docker compose down         (stop & remove)
# =============================================================================

services:
  ros2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: robotics_assignment
    
    # Keep container running
    stdin_open: true
    tty: true
    
    # GUI support (X11 forwarding for Gazebo/RViz2)
    environment:
      - DISPLAY=host.docker.internal:0.0
      - LIBGL_ALWAYS_INDIRECT=0
      - TURTLEBOT3_MODEL=burger
      - QT_X11_NO_MITSHM=1
      - GAZEBO_MODEL_PATH=/opt/ros/humble/share/turtlebot3_gazebo/models
    
    # Mount your local code into the container
    volumes:
      - ./src:/ros2_ws/src
      - ./docs:/ros2_ws/docs
      - ./README.md:/ros2_ws/README.md
    
    # Network for ROS2 communication
    network_mode: host
    
    # Shared memory for ROS2 DDS
    ipc: host
    
    # GPU passthrough (if available)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # Fallback service without GPU (use this if you don't have NVIDIA GPU)
  ros2-nogpu:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: robotics_assignment_nogpu
    profiles: ["nogpu"]
    
    stdin_open: true
    tty: true
    
    environment:
      - DISPLAY=host.docker.internal:0.0
      - LIBGL_ALWAYS_INDIRECT=1
      - TURTLEBOT3_MODEL=burger
      - QT_X11_NO_MITSHM=1
      - MESA_GL_VERSION_OVERRIDE=3.3
      - GAZEBO_MODEL_PATH=/opt/ros/humble/share/turtlebot3_gazebo/models
    
    volumes:
      - ./src:/ros2_ws/src
      - ./docs:/ros2_ws/docs
      - ./README.md:/ros2_ws/README.md
    
    network_mode: host
    ipc: host
